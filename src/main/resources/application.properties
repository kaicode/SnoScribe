server.port=8084

# LLM provider: ollama | anthropic | google | openai
# Ollama (uncomment to use)
llm.provider=ollama
llm.ollama.base-url=http://localhost:11434
llm.ollama.model=qwen3.5:9b
#llm.ollama.model=gemma3:4b
#llm.ollama.model=gemma3:12b

# Anthropic (uncomment to use)
#llm.provider=anthropic
#llm.anthropic.api-key=sk-ant...
#llm.anthropic.model=claude-opus-4-5

# Google Gemini (uncomment to use)
#llm.provider=google
#llm.google.api-key=AIza...
#llm.google.model=gemini-1.5-pro

# OpenAI (uncomment to use)
#llm.provider=openai
#llm.openai.api-key=sk-...
#llm.openai.model=gpt-4o

# FHIR Terminology Server base URL for SNOMED CT concept lookup
fhir.tx.url=https://implementation-demo.snomedtools.org/snowstorm-lite/fhir

# After strict + fuzzy $expand return no rows, ask the LLM for 1–2 synonym phrases and search again
terminology.synonym-llm.enabled=true

# Infinity rerank fallback when no whole-term match on FHIR expansion (see scripts/setup-infinity-reranker.sh)
infinity.rerank.enabled=true
infinity.rerank.base-url=http://localhost:7997
infinity.rerank.model=reranker
# Tune after observing scores; assign concept only when best per-concept max score is at least this
infinity.rerank.min-score=0.85
